services:
  postgres:
    image: postgres:16-alpine
    container_name: neurodrop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: neurodrop
      POSTGRES_PASSWORD: neurodrop_dev
      POSTGRES_DB: neurodrop
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - neurodrop_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neurodrop -d neurodrop"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: neurodrop-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - neurodrop_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  neurodrop_pg:
  neurodrop_redis:
